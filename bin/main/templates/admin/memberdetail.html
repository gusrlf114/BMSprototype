<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	
	<h1>회원 계좌 목록</h1>
	
	<table>
	    <thead>
	        <tr>
	            <th>계좌번호</th>
	            <th>상태</th>
	            <th>동결</th>
	            <th>해제</th>
	        </tr>
	    </thead>
	    <tbody id="talbe"></tbody>
	</table>
	
	
	
	
	
	<script>
	// 전에 보냈던 아이디값 받는방식
	const urlParams = new URLSearchParams(window.location.search); 
	const memberId = urlParams.get("id");
	const token =localStorage.getItem("token");
	
	// 계좌 목록 조회
	fetch(`/api/admin/member?id=${memberId}`,{
		method:"get",
		headers:{
			"Authorization": "Bearer "+token
		}
	})
	    .then(res => res.json())
	    .then(data => {
	        const table = document.getElementById("talbe");
	
	        data.forEach(ac => {
	            const status = ac.active ? "활성" : "동결";
	
	            const row = `
	                <tr>
	                    <td>${ac.accountNumber}</td>
	                    <td>${status}</td>
	                    <td>
	                        <button onclick="freeze('${ac.accountNumber}')">동결</button>
	                    </td>
	                    <td>
	                        <button onclick="unfreeze('${ac.accountNumber}')">해제</button>
	                    </td>
	                </tr>
	            `;
	            table.innerHTML += row;
	        });
	    });
	
	// 계좌 동결
	function freeze(accountNumber) {
	    fetch(`/api/admin/frozen?accountNumber=${accountNumber}`, {
	        method: "PUT",
	        headers:{
	    		"Authorization": "Bearer "+token
	    	}
	    })
	    .then(res => res.json())
	    .then(data => {
	        alert(data.message || data.error); //좋은방식
	        location.reload();
	    });
	}
	
	// 계좌 동결 해제
	function unfreeze(accountNumber) {
	    fetch(`/api/admin/unfrozen?accountNumber=${accountNumber}`, {
	        method: "PUT",
	        headers:{
	    		"Authorization": "Bearer "+token
	    	}
	    })
	    .then(res => res.json())
	    .then(data => {
	        alert(data.message || data.error);
	        location.reload();
	    });
	}
	</script>

</body>
</html>
